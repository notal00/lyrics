<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
<title>歌词本</title>
<script>
(function() {
  var mirrors = ['https://fonts.googleapis.com','https://fonts.loli.net','https://fonts.font.im','https://googlefonts.cn'];
  var path = '/css2?family=Noto+Serif+SC:wght@300;400;500&display=swap';
  var loaded = false;
  mirrors.forEach(function(base, i) {
    var link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = base + path;
    link.onload = function() { loaded = true; };
    setTimeout(function() { if (!loaded) document.head.appendChild(link); }, i * 800);
  });
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f6f3ed;
  --surface: #ffffff;
  --border: #dcd9d0;
  --text: #2a2825;
  --text-soft: #7a756d;
  --text-faint: #b8b1a8;
  --accent: #3d3530;
  --accent-light: #9e897a;
  --shadow: rgba(40,30,20,0.05);
  --ui-font: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #161412; --surface: #1e1c1a; --border: #3d3935;
    --text: #e8e4de; --text-soft: #a8a096; --text-faint: #6e675e;
    --accent: #f0e6d8; --accent-light: #c4a98a; --shadow: rgba(0,0,0,0.2);
  }
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--ui-font);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 24px 60px;
}

body::before {
  content: ''; position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0;
}

header { width: 100%; max-width: 460px; padding: 40px 0 10px; z-index: 1; }
.site-title { font-family: 'Noto Serif SC', serif; font-size: 24px; letter-spacing: 0.15em; display: flex; align-items: center; gap: 10px; }
.site-title-dot { width: 4px; height: 4px; background: var(--accent-light); border-radius: 50%; opacity: 0.6; }
.site-sub { font-size: 10px; color: var(--text-faint); letter-spacing: 0.2em; text-transform: uppercase; margin-left: 14px; margin-top: 4px; }

.card-area {
  width: 100%; max-width: 460px;
  padding: 15px 0;
  display: flex; flex-direction: column; align-items: center; z-index: 1;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 32px 26px;
  box-shadow: 0 8px 24px var(--shadow);
  width: 100%; position: relative;
  cursor: pointer;
}

.card-lyric {
  font-family: 'Noto Serif SC', serif;
  font-size: 1.05rem; line-height: 1.8;
  white-space: pre-wrap; margin-bottom: 24px;
}

.card-meta { display: flex; justify-content: space-between; align-items: flex-end; padding-top: 15px; border-top: 1px solid var(--bg); }
.card-song-name { font-weight: 500; font-size: 13px; color: var(--text-soft); }
.card-artist { font-size: 11px; color: var(--text-faint); margin-top: 3px; }
.card-date { font-size: 10px; color: var(--text-faint); font-family: "Georgia", serif; opacity: 0.8; }

.refresh-btn {
  margin-top: 16px;
  padding: 6px 14px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-faint);
  font-size: 9px;
  cursor: pointer;
  letter-spacing: 0.1em;
  font-family: var(--ui-font);
}

.form-section { width: 100%; max-width: 460px; z-index: 1; margin-top: 30px; }
.form-section-label { font-size: 10px; color: var(--text-faint); letter-spacing: 0.3em; margin-bottom: 24px; text-align: center; border-bottom: 1px solid var(--border); padding-bottom: 10px; }

.field { margin-bottom: 16px; display: flex; flex-direction: column; gap: 6px; }
.field label { font-size: 9px; color: var(--text-faint); text-transform: uppercase; font-weight: 600; letter-spacing: 0.05em; }

/* 重点优化：带边框且字体精致的输入框 */
.field input, .field textarea {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 8px 12px;
  color: var(--text);
  font-family: var(--ui-font); /* 输入内容字体 */
  font-size: 14px;
  outline: none;
  transition: all 0.3s;
}

/* 占位符（提示文字）字体设置 */
.field input::placeholder, .field textarea::placeholder {
  font-family: var(--ui-font);
  color: var(--text-faint);
  font-size: 13px;
  font-weight: 300;
}

.field textarea { line-height: 1.6; height: 90px; }
.field input:focus, .field textarea:focus { border-color: var(--accent-light); box-shadow: 0 0 0 2px rgba(158,137,122,0.1); }

.tip { font-size: 9px; color: var(--text-faint); margin-top: 6px; font-weight: 400; }

.row { display: flex; gap: 15px; }
.row .field { flex: 1; }

@media (max-width: 480px) {
  .row { flex-direction: column; gap: 0; }
}

.submit-btn {
  width: 100%; padding: 12px; background: var(--accent); color: var(--bg);
  border: none; border-radius: 4px; cursor: pointer;
  letter-spacing: 0.6em; font-size: 11px; margin-top: 10px;
  font-family: var(--ui-font);
}

.fab {
  position: fixed; bottom: 30px; right: 30px; width: 44px; height: 44px;
  background: var(--accent); color: var(--bg); border: none; border-radius: 50%;
  font-size: 18px; cursor: pointer; box-shadow: 0 4px 15px var(--shadow); z-index: 100;
  display: flex; align-items: center; justify-content: center;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.entering { animation: fadeUp 0.6s ease-out forwards; }
</style>
</head>
<body>

<header>
  <div class="site-title"><div class="site-title-dot"></div>歌词本</div>
  <div class="site-sub">LYRIC JOURNAL</div>
</header>

<div class="card-area" id="cardArea"></div>

<div class="form-section" id="formSection">
  <div class="form-section-label">ADD NEW</div>
  <div class="field">
    <label>LYRICS</label>
    <textarea id="lyricInput" placeholder="在此输入歌词内容..." rows="3"></textarea>
    <div class="tip">* 填写时按回车键即可换行排版</div>
  </div>
  <div class="row">
    <div class="field">
      <label>TITLE</label>
      <input id="songInput" type="text" placeholder="歌名">
    </div>
    <div class="field">
      <label>ARTIST</label>
      <input id="artistInput" type="text" placeholder="歌手">
    </div>
  </div>
  <button class="submit-btn" id="submitBtn" onclick="submitLyric()">Submit</button>
  <div id="formMsg" style="text-align:center; font-size:10px; margin-top:10px; color:var(--accent-light); height:14px;"></div>
</div>

<button class="fab" onclick="scrollToForm()">＋</button>

<script>
const SUPABASE_URL = 'https://zkpctzxyqpiiqxvnmauo.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InprcGN0enh5cXBpaXF4dm5tYXVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNDkxNDAsImV4cCI6MjA5MDkyNTE0MH0.Z7WdneCs_vJOblWho1neuMLI86h1FrdNqi6N2-DI4ZQ';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let allLyrics = [];
let currentId = null;

async function loadLyrics() {
  const { data, error } = await db.from('lyrics').select('*').order('created_at', { ascending: false });
  if (error || !data) return;
  allLyrics = data;
  if (data.length > 0) showRandomCard(true);
}

function showRandomCard(initial = false) {
  const area = document.getElementById('cardArea');
  if (allLyrics.length === 0) return;
  let candidates = allLyrics.length > 1 && currentId ? allLyrics.filter(l => l.id !== currentId) : allLyrics;
  const item = candidates[Math.floor(Math.random() * candidates.length)];
  currentId = item.id;
  
  const date = new Date(item.created_at);
  const dateStr = `${date.getFullYear()} / ${date.getMonth()+1} / ${date.getDate()}`;

  area.innerHTML = `
    <div class="card entering" onclick="showRandomCard()">
      <div class="card-lyric">${escHtml(item.lyric)}</div>
      <div class="card-meta">
        <div>
          <div class="card-song-name">《${escHtml(item.song_name)}》</div>
          <div class="card-artist">${escHtml(item.artist)}</div>
        </div>
        <div class="card-date">${dateStr}</div>
      </div>
    </div>
    <button class="refresh-btn" onclick="showRandomCard()">NEXT</button>
  `;
}

function escHtml(str) { 
  if(!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g, '<br>'); 
}

async function submitLyric() {
  const lyric = document.getElementById('lyricInput').value.trim();
  const song = document.getElementById('songInput').value.trim();
  const artist = document.getElementById('artistInput').value.trim();
  const msg = document.getElementById('formMsg');
  const btn = document.getElementById('submitBtn');

  if (!lyric || !song || !artist) return;

  btn.disabled = true;
  const { data, error } = await db.from('lyrics').insert([{ lyric, song_name: song, artist }]).select().single();
  
  if (!error) {
    msg.innerText = "SUCCESS";
    allLyrics.unshift(data);
    showRandomCard(false);
    document.getElementById('lyricInput').value = '';
    document.getElementById('songInput').value = '';
    document.getElementById('artistInput').value = '';
    setTimeout(() => { msg.innerText = ""; window.scrollTo({ top: 0, behavior: 'smooth' }); }, 1200);
  }
  btn.disabled = false;
}

function scrollToForm() { 
  const target = document.getElementById('formSection');
  window.scrollTo({ top: target.offsetTop - 30, behavior: 'smooth' });
}
loadLyrics();
</script>
</body>
</html>
