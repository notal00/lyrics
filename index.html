<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
<title>歌词本</title>
<script>
(function() {
  var mirrors = ['https://fonts.googleapis.com','https://fonts.loli.net','https://fonts.font.im','https://googlefonts.cn'];
  var path = '/css2?family=Noto+Serif+SC:wght@300;400;500&family=Noto+Sans+SC:wght@300;400&display=swap';
  var loaded = false;
  mirrors.forEach(function(base, i) {
    var link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = base + path;
    link.onload = function() { loaded = true; };
    setTimeout(function() { if (!loaded) document.head.appendChild(link); }, i * 800);
  });
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f2ec;
  --bg2: #ede9e0;
  --surface: #ffffff;
  --border: #d8d2c5;
  --text: #1a1814;
  --text-soft: #6b6560;
  --text-faint: #a09890;
  --accent: #2c2420;
  --accent-light: #8b6f5e;
  --shadow: rgba(30,24,18,0.08);
  --shadow-md: rgba(30,24,18,0.12);
  --radius: 4px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #141210; --bg2: #1c1917; --surface: #211f1c; --border: #332f2a;
    --text: #f0ebe3; --text-soft: #9a9088; --text-faint: #5c5650;
    --accent: #e8ddd0; --accent-light: #c4a98a; --shadow: rgba(0,0,0,0.3);
  }
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans SC', sans-serif;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 16px 60px; /* 减小底部 padding */
  line-height: 1.6;
  overflow-x: hidden;
}

body::before {
  content: ''; position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0;
}

header { width: 100%; max-width: 500px; padding: 30px 0 10px; z-index: 1; }
.site-title { font-family: 'Noto Serif SC', serif; font-size: 28px; letter-spacing: 0.1em; display: flex; align-items: center; gap: 10px; }
.site-title-dot { width: 6px; height: 6px; background: var(--accent-light); border-radius: 50%; }
.site-sub { font-size: 9px; color: var(--text-faint); letter-spacing: 0.2em; text-transform: uppercase; margin: 2px 0 0 16px; }

.card-area {
  width: 100%; max-width: 500px;
  padding: 20px 0;
  min-height: 300px; 
  display: flex; flex-direction: column; align-items: center; z-index: 1;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 30px 24px;
  box-shadow: 0 8px 24px var(--shadow);
  width: 100%; position: relative;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.card-lyric {
  font-family: 'Noto Serif SC', serif;
  font-size: 1.15rem; line-height: 1.7;
  white-space: pre-wrap; margin-bottom: 25px;
  color: var(--text);
}

.card-meta { display: flex; justify-content: space-between; align-items: flex-end; border-top: 1px dashed var(--border); padding-top: 12px; }
.card-song-name { font-weight: 500; font-size: 13px; color: var(--text-soft); }
.card-artist { font-size: 11px; color: var(--text-faint); }
.card-date { font-size: 10px; color: var(--text-faint); font-family: serif; }

.refresh-btn {
  margin-top: 20px;
  padding: 6px 16px;
  border-radius: 18px;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text-soft);
  font-size: 11px;
  cursor: pointer;
  display: flex; align-items: center; gap: 6px;
}

.form-section { width: 100%; max-width: 500px; z-index: 1; border-top: 1px solid var(--border); padding-top: 30px; margin-top: 10px; }
.form-section-label { font-size: 10px; color: var(--text-faint); letter-spacing: 0.2em; margin-bottom: 16px; text-align: center; }

.field { margin-bottom: 12px; display: flex; flex-direction: column; gap: 4px; }
.field label { font-size: 10px; color: var(--text-faint); }

.field input, .field textarea {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 12px;
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  outline: none;
  -webkit-appearance: none;
}
.field textarea { font-family: 'Noto Serif SC', serif; line-height: 1.5; resize: none; }
.field input:focus, .field textarea:focus { border-color: var(--accent-light); }

.tip { font-size: 9px; color: var(--text-faint); margin-top: -8px; margin-bottom: 10px; }

/* 关键修复：响应式布局 */
.row { display: flex; gap: 12px; }
.row .field { flex: 1; min-width: 0; }

@media (max-width: 480px) {
  .row { flex-direction: column; gap: 0; } /* 手机端变为上下堆叠 */
}

.submit-btn {
  width: 100%; padding: 12px; background: var(--accent); color: var(--bg);
  border: none; border-radius: var(--radius); cursor: pointer;
  letter-spacing: 0.4em; font-size: 13px; margin-top: 10px;
}

.fab {
  position: fixed; bottom: 20px; right: 20px; width: 44px; height: 44px;
  background: var(--accent); color: var(--bg); border: none; border-radius: 50%;
  font-size: 20px; cursor: pointer; box-shadow: 0 8px 16px var(--shadow); z-index: 100;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.entering { animation: fadeUp 0.5s ease-out forwards; }
</style>
</head>
<body>

<header>
  <div class="site-title"><div class="site-title-dot"></div>歌词本</div>
  <div class="site-sub">Personal Lyrics Journal</div>
</header>

<div class="card-area" id="cardArea">
  <div class="state-msg">正在加载...</div>
</div>

<div class="form-section" id="formSection">
  <div class="form-section-label">记录新篇章</div>
  <div class="field">
    <label>歌词内容</label>
    <textarea id="lyricInput" placeholder="在此输入歌词..." rows="3"></textarea>
    <div class="tip">* 填写时请直接回车换行以保持排版</div>
  </div>
  <div class="row">
    <div class="field">
      <label>歌名</label>
      <input id="songInput" type="text" placeholder="Song Title">
    </div>
    <div class="field">
      <label>歌手</label>
      <input id="artistInput" type="text" placeholder="Artist">
    </div>
  </div>
  <button class="submit-btn" id="submitBtn" onclick="submitLyric()">记 录</button>
  <div id="formMsg" style="text-align:center; font-size:11px; margin-top:8px; height:14px;"></div>
</div>

<button class="fab" onclick="scrollToForm()">＋</button>

<script>
const SUPABASE_URL = 'https://zkpctzxyqpiiqxvnmauo.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InprcGN0enh5cXBpaXF4dm5tYXVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNDkxNDAsImV4cCI6MjA5MDkyNTE0MH0.Z7WdneCs_vJOblWho1neuMLI86h1FrdNqi6N2-DI4ZQ';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let allLyrics = [];
let currentId = null;

async function loadLyrics() {
  const { data, error } = await db.from('lyrics').select('*').order('created_at', { ascending: false });
  if (error || !data) { document.getElementById('cardArea').innerHTML = '加载失败'; return; }
  allLyrics = data;
  if (data.length > 0) showRandomCard(true);
  else document.getElementById('cardArea').innerHTML = '<div class="state-msg">暂无内容</div>';
}

function showRandomCard(initial = false) {
  const area = document.getElementById('cardArea');
  let candidates = allLyrics.length > 1 && currentId ? allLyrics.filter(l => l.id !== currentId) : allLyrics;
  const item = candidates[Math.floor(Math.random() * candidates.length)];
  currentId = item.id;
  
  const date = new Date(item.created_at);
  const dateStr = `${date.getFullYear()}.${date.getMonth()+1}.${date.getDate()}`;

  area.innerHTML = `
    <div class="card entering" onclick="showRandomCard()">
      <div class="card-lyric">${escHtml(item.lyric)}</div>
      <div class="card-meta">
        <div>
          <div class="card-song-name">《${escHtml(item.song_name)}》</div>
          <div class="card-artist">${escHtml(item.artist)}</div>
        </div>
        <div class="card-date">${dateStr}</div>
      </div>
    </div>
    <button class="refresh-btn" onclick="showRandomCard()">
      <span>↻</span> 换一条看看
    </button>
  `;
}

function escHtml(str) { 
  if(!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g, '<br>'); 
}

async function submitLyric() {
  const lyric = document.getElementById('lyricInput').value.trim();
  const song = document.getElementById('songInput').value.trim();
  const artist = document.getElementById('artistInput').value.trim();
  const msg = document.getElementById('formMsg');
  const btn = document.getElementById('submitBtn');

  if (!lyric || !song || !artist) {
    msg.innerText = "请填写完整";
    return;
  }

  btn.disabled = true;
  const { data, error } = await db.from('lyrics').insert([{ lyric, song_name: song, artist }]).select().single();
  
  if (error) {
    msg.innerText = "记录失败";
    btn.disabled = false;
  } else {
    msg.innerText = "已成功记录";
    allLyrics.unshift(data);
    showRandomCard(false);
    document.getElementById('lyricInput').value = '';
    document.getElementById('songInput').value = '';
    document.getElementById('artistInput').value = '';
    btn.disabled = false;
    // 延时滚动，避免与软键盘关闭冲突
    setTimeout(() => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }, 100);
  }
}

function scrollToForm() { 
  const target = document.getElementById('formSection');
  // 使用 offsetTop 避开 smooth scroll 锚点问题
  window.scrollTo({
    top: target.offsetTop - 20,
    behavior: 'smooth'
  });
}
loadLyrics();
</script>

</body>
</html>
